<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ料金比較シミュレーター</title>
    <!-- ライブラリ一括読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold">シミュレーターを起動中...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;
        
        // アイコンの設定
        const { 
          Smartphone, Wifi, Mail, Users, ArrowRight, TrendingDown, 
          RotateCcw, Building2, PlusCircle, Copy, ChevronLeft, AlertCircle, Globe 
        } = lucide;

        function App() {
          const [carrierA, setCarrierA] = useState('ドコモ');
          const [carrierB, setCarrierB] = useState('au');
          const [otherCarrierA, setOtherCarrierA] = useState('');
          const [devices, setDevices] = useState([
            { deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }
          ]);
          const [selectedEmail, setSelectedEmail] = useState('free');
          const [linesCount, setLinesCount] = useState(1);
          const [purchaseCount, setPurchaseCount] = useState(1);
          const [showResults, setShowResults] = useState(false);
          const [error, setError] = useState(null);

          const finalCarrierA = carrierA === 'その他' ? otherCarrierA : carrierA;

          const calculateSavings = () => {
            let totalDeviceSavings = 0;
            let totalPlanSavings = 0;
            devices.forEach(d => {
              totalDeviceSavings += (Number(d.deviceFeeA) - Number(d.deviceFeeB)) * 23;
              totalPlanSavings += (Number(d.planFeeA) - Number(d.planFeeB)) * 23;
            });
            return {
              totalDeviceSavings,
              totalPlanSavings,
              grandTotal: totalDeviceSavings + totalPlanSavings
            };
          };

          const results = calculateSavings();

          const handleCalculate = () => {
            if (carrierA === carrierB && carrierA !== 'その他') {
              setError('キャリアが同一です');
              return;
            }
            setError(null);
            setShowResults(true);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleReset = () => {
            setShowResults(false);
            setDevices([{ deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }]);
            setError(null);
          };

          return (
            <div className="min-h-screen pb-20 bg-slate-50 font-sans text-slate-900">
              <header className="bg-white border-b border-slate-100 py-8 px-6 mb-8 text-center">
                <div className="max-w-4xl mx-auto">
                  <h1 className="text-3xl font-black tracking-tighter text-slate-900 sm:text-4xl mb-1">
                    スマホ料金比較シミュレーター
                  </h1>
                  <p className="text-slate-400 text-sm font-bold">tano tool</p>
                </div>
              </header>

              <main className="max-w-2xl mx-auto px-4">
                <AnimatePresence mode="wait">
                  {!showResults ? (
                    <motion.div key="inputs" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="space-y-6">
                      <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div className="flex items-center gap-2 mb-6">
                          <Building2 className="w-6 h-6 text-blue-600" />
                          <h2 className="text-xl font-bold">キャリア設定</h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-500">比較元</label>
                            <select value={carrierA} onChange={(e) => setCarrierA(e.target.value)}
                              className="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold focus:border-blue-500 outline-none">
                              {['ドコモ', 'au', 'ソフトバンク', 'Y!mobile', 'UQmobile', 'ahamo', 'その他'].map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                          </div>
                          <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-500">比較先</label>
                            <select value={carrierB} onChange={(e) => setCarrierB(e.target.value)}
                              className="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold focus:border-blue-500 outline-none">
                              {['ドコモ', 'au', 'ソフトバンク', 'Y!mobile', 'UQmobile', 'ahamo'].map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                          </div>
                        </div>
                        {error && <p className="text-red-500 text-sm font-bold mt-4 flex items-center gap-1"><AlertCircle className="w-4 h-4"/>{error}</p>}
                      </section>

                      {devices.map((device, idx) => (
                        <section key={idx} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                          <div className="flex items-center gap-2 mb-6 font-bold text-xl">
                            <Smartphone className="text-blue-600" />
                            <h3>{idx + 1}台目の情報</h3>
                          </div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-4">
                              <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">端末代金</h4>
                              <input type="number" placeholder="今の月額" className="w-full p-4 bg-slate-50 rounded-2xl" onChange={(e) => {const n=[...devices]; n[idx].deviceFeeA=e.target.value; setDevices(n)}} />
                              <input type="number" placeholder="新しい月額" className="w-full p-4 bg-slate-50 rounded-2xl" onChange={(e) => {const n=[...devices]; n[idx].deviceFeeB=e.target.value; setDevices(n)}} />
                            </div>
                            <div className="space-y-4">
                              <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">プラン料金</h4>
                              <input type="number" placeholder="今のプラン" className="w-full p-4 bg-slate-50 rounded-2xl" onChange={(e) => {const n=[...devices]; n[idx].planFeeA=e.target.value; setDevices(n)}} />
                              <input type="number" placeholder="新しいプラン" className="w-full p-4 bg-slate-50 rounded-2xl" onChange={(e) => {const n=[...devices]; n[idx].planFeeB=e.target.value; setDevices(n)}} />
                            </div>
                          </div>
                        </section>
                      ))}

                      <button onClick={handleCalculate} className="w-full py-6 bg-blue-600 text-white font-black text-xl rounded-full shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        結果を計算する <ArrowRight />
                      </button>
                    </motion.div>
                  ) : (
                    <motion.div key="results" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-6">
                      <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-10 rounded-[40px] text-white shadow-2xl relative overflow-hidden text-center">
                        <p className="text-blue-100 font-bold mb-2 uppercase tracking-widest">2年間の節約期待額</p>
                        <h2 className="text-6xl font-black mb-6 italic">¥{results.grandTotal.toLocaleString()}</h2>
                        <div className="inline-block bg-white/20 backdrop-blur-md px-6 py-2 rounded-full font-bold">
                          1人あたり約 {Math.round(results.grandTotal / devices.length).toLocaleString()}円 お得！
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 text-center">
                          <p className="text-slate-400 text-xs font-bold mb-1">端末代の差額</p>
                          <p className="text-2xl font-black text-slate-800">{results.totalDeviceSavings.toLocaleString()}円</p>
                        </div>
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 text-center">
                          <p className="text-slate-400 text-xs font-bold mb-1">通信料の差額</p>
                          <p className="text-2xl font-black text-slate-800">{results.totalPlanSavings.toLocaleString()}円</p>
                        </div>
                      </div>

                      <button onClick={() => setShowResults(false)} className="w-full py-5 bg-white border-2 border-slate-200 text-slate-600 font-black rounded-3xl flex items-center justify-center gap-2">
                        <ChevronLeft /> 入力画面に戻る
                      </button>
                    </motion.div>
                  )}
                </AnimatePresence>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
