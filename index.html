<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ料金比較シミュレーター</title>
    <!-- 必要なライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="font-bold">シミュレーターを構成中...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const startApp = () => {
            const { 
              Smartphone, Wifi, Mail, Users, ArrowRight, TrendingDown, 
              RotateCcw, Building2, PlusCircle, Copy, ChevronLeft, AlertCircle, Globe 
            } = lucide;

            function App() {
                // --- あなたのこだわりロジック：全復元 ---
                const [carrierA, setCarrierA] = useState('ドコモ');
                const [carrierB, setCarrierB] = useState('au');
                const [otherCarrierA, setOtherCarrierA] = useState('');
                const [devices, setDevices] = useState([{ deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }]);
                const [selectedEmail, setSelectedEmail] = useState('free');
                const [linesCount, setLinesCount] = useState(1);
                const [purchaseCount, setPurchaseCount] = useState(1);
                const [internetInfo, setInternetInfo] = useState('');
                const [internetDiscount, setInternetDiscount] = useState('無し');
                const [showResults, setShowResults] = useState(false);
                const [error, setError] = useState(null);

                const finalCarrierA = carrierA === 'その他' ? otherCarrierA : carrierA;

                const calculateSavings = () => {
                    let totalDeviceSavings = 0;
                    let totalPlanSavings = 0;
                    devices.forEach(d => {
                        totalDeviceSavings += (Number(d.deviceFeeA) - Number(d.deviceFeeB)) * 23;
                        totalPlanSavings += (Number(d.planFeeA) - Number(d.planFeeB)) * 23;
                    });
                    return {
                        totalDeviceSavings,
                        totalPlanSavings,
                        grandTotal: totalDeviceSavings + totalPlanSavings
                    };
                };

                const results = calculateSavings();

                const handleAddDevice = () => {
                    if (devices.length < 6) setDevices([...devices, { deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }]);
                };

                const copyFirstDeviceInfo = (idx) => {
                    const newDevices = [...devices];
                    newDevices[idx] = { ...newDevices[0] };
                    setDevices(newDevices);
                };

                return (
                    <div className="min-h-screen pb-20">
                        <header className="bg-white border-b py-8 px-6 mb-8 text-center">
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter">スマホ料金比較シミュレーター</h1>
                            <p className="text-slate-400 text-sm font-bold">tano tool</p>
                        </header>

                        <main className="max-w-2xl mx-auto px-4">
                            <AnimatePresence mode="wait">
                                {!showResults ? (
                                    <motion.div key="in" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="space-y-6">
                                        {/* キャリア設定 */}
                                        <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><Building2 className="text-blue-600"/> 正直比較</h2>
                                            <div className="grid grid-cols-2 gap-4">
                                                <select value={carrierA} onChange={e=>setCarrierA(e.target.value)} className="p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                                                    {['ドコモ','au','ソフトバンク','Y!mobile','UQmobile','ahamo','その他'].map(c=><option key={c}>{c}</option>)}
                                                </select>
                                                <select value={carrierB} onChange={e=>setCarrierB(e.target.value)} className="p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                                                    {['ドコモ','au','ソフトバンク','Y!mobile','UQmobile','ahamo'].map(c=><option key={c}>{c}</option>)}
                                                </select>
                                            </div>
                                        </section>

                                        {/* 端末ごとの入力 */}
                                        {devices.map((d, i) => (
                                            <section key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                <div className="flex justify-between items-center mb-6">
                                                    <h3 className="font-bold flex items-center gap-2"><Smartphone className="text-blue-600"/> {i+1}台目の情報</h3>
                                                    {i > 0 && <button onClick={()=>copyFirstDeviceInfo(i)} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full"><Copy className="inline w-3 h-3 mr-1"/> 1台目コピー</button>}
                                                </div>
                                                <input type="text" placeholder="端末名（例: iPhone16）" className="w-full p-3 bg-slate-50 rounded-xl mb-6 text-sm outline-none" onChange={e=>{const n=[...devices]; n[i].deviceName=e.target.value; setDevices(n)}} />
                                                <div className="grid grid-cols-2 gap-8">
                                                    <div className="space-y-3">
                                                        <p className="text-[10px] font-black text-slate-400 uppercase">端末代(月額)</p>
                                                        <input type="number" placeholder="今の月額" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" onChange={e=>{const n=[...devices]; n[i].deviceFeeA=e.target.value; setDevices(n)}} />
                                                        <input type="number" placeholder="新しい月額" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" onChange={e=>{const n=[...devices]; n[i].deviceFeeB=e.target.value; setDevices(n)}} />
                                                    </div>
                                                    <div className="space-y-3">
                                                        <p className="text-[10px] font-black text-slate-400 uppercase">プラン(月額)</p>
                                                        <input type="number" placeholder="今のプラン" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" onChange={e=>{const n=[...devices]; n[i].planFeeA=e.target.value; setDevices(n)}} />
                                                        <input type="number" placeholder="新しいプラン" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" onChange={e=>{const n=[...devices]; n[i].planFeeB=e.target.value; setDevices(n)}} />
                                                    </div>
                                                </div>
                                            </section>
                                        ))}
                                        
                                        <button onClick={handleAddDevice} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold flex items-center justify-center gap-2 hover:bg-white"><PlusCircle className="w-5 h-5"/> 追加</button>

                                        {/* オプション・回線数（あなたのこだわり！） */}
                                        <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <p className="text-xs font-bold text-slate-500 flex items-center gap-1"><Mail className="w-3 h-3"/> メール設定</p>
                                                <select className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none" onChange={e=>setSelectedEmail(e.target.value)}>
                                                    <option value="free">フリーメール</option>
                                                    <option value="carrier">キャリアメール</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <p className="text-xs font-bold text-slate-500 flex items-center gap-1"><Users className="w-3 h-3"/> 家族回線数</p>
                                                <select className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border-none outline-none" onChange={e=>setLinesCount(e.target.value)}>
                                                    {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}回線</option>)}
                                                </select>
                                            </div>
                                        </section>

                                        <button onClick={() => { window.scrollTo(0,0); setShowResults(true); }} className="w-full py-6 bg-blue-600 text-white font-black text-xl rounded-full shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                                            結果を表示する <ArrowRight />
                                        </button>
                                    </motion.div>
                                ) : (
                                    <motion.div key="out" initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="space-y-6">
                                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-10 rounded-[40px] text-white shadow-2xl text-center relative overflow-hidden">
                                            <p className="text-blue-100 font-bold mb-2 uppercase tracking-widest text-sm">2年間の合計節約期待額</p>
                                            <h2 className="text-6xl font-black italic mb-4">¥{results.grandTotal.toLocaleString()}</h2>
                                            <div className="inline-block bg-white/20 backdrop-blur-md px-6 py-2 rounded-full font-bold text-sm">1人あたり約 {Math.round(results.grandTotal / devices.length).toLocaleString()}円 お得</div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 text-center shadow-sm">
                                                <p className="text-slate-400 text-[10px] font-black mb-1 uppercase">端末代の差額</p>
                                                <p className="text-2xl font-black text-slate-800">{results.totalDeviceSavings.toLocaleString()}円</p>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 text-center shadow-sm">
                                                <p className="text-slate-400 text-[10px] font-black mb-1 uppercase">プランの差額</p>
                                                <p className="text-2xl font-black text-slate-800">{results.totalPlanSavings.toLocaleString()}円</p>
                                            </div>
                                        </div>
                                        
                                        <button onClick={() => setShowResults(false)} className="w-full py-5 bg-white border-2 border-slate-200 text-slate-600 font-black rounded-3xl flex items-center justify-center gap-2">
                                            <ChevronLeft /> 入力に戻る
                                        </button>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </main>
                    </div>
                );
            }
            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        };

        // 起動処理：ライブラリがロードされてから0.5秒後に開始
        window.addEventListener('load', () => setTimeout(startApp, 500));
    </script>
</body>
</html>
