<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ料金比較シミュレーター</title>
    <!-- 1. 基本ツールを先に読み込む -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 2. React本体を読み込む -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 3. アニメーションと変換ツールを読み込む -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400">
            <div class="text-center">
                <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p id="loading-text" class="font-bold">シミュレーターを準備中...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // 外部ライブラリから必要な機能を抽出
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { 
          Smartphone, Wifi, Mail, Users, ArrowRight, Building2, PlusCircle, Copy, ChevronLeft, AlertCircle 
        } = lucide;

        function App() {
            // あなたのこだわりステート群
            const [carrierA, setCarrierA] = useState('ドコモ');
            const [carrierB, setCarrierB] = useState('au');
            const [devices, setDevices] = useState([{ deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }]);
            const [selectedEmail, setSelectedEmail] = useState('free');
            const [linesCount, setLinesCount] = useState(1);
            const [showResults, setShowResults] = useState(false);
            const [error, setError] = useState(null);

            const calculateSavings = () => {
                let totalDeviceSavings = 0;
                let totalPlanSavings = 0;
                devices.forEach(d => {
                    totalDeviceSavings += (Number(d.deviceFeeA) - Number(d.deviceFeeB)) * 23;
                    totalPlanSavings += (Number(d.planFeeA) - Number(d.planFeeB)) * 23;
                });
                return {
                    totalDeviceSavings,
                    totalPlanSavings,
                    grandTotal: totalDeviceSavings + totalPlanSavings
                };
            };

            const results = calculateSavings();

            const handleAddDevice = () => {
                if (devices.length < 6) setDevices([...devices, { deviceFeeA: 0, deviceFeeB: 0, planFeeA: 0, planFeeB: 0, deviceName: '' }]);
            };

            const copyFirstDeviceInfo = (idx) => {
                const newDevices = [...devices];
                newDevices[idx] = { ...newDevices[0] };
                setDevices(newDevices);
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b py-8 px-6 mb-8 text-center">
                        <h1 className="text-3xl font-black text-slate-900 tracking-tighter italic">料金比較シミュレーター</h1>
                        <p className="text-slate-400 text-sm font-bold uppercase tracking-widest">tano tool</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4">
                        <AnimatePresence mode="wait">
                            {!showResults ? (
                                <motion.div key="input-form" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="space-y-6">
                                    {/* キャリア設定セクション */}
                                    <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><Building2 className="text-blue-600"/> キャリア設定</h2>
                                        <div className="grid grid-cols-2 gap-4">
                                            <select value={carrierA} onChange={e=>setCarrierA(e.target.value)} className="p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                                                {['ドコモ','au','ソフトバンク','Y!mobile','UQmobile','ahamo','その他'].map(c=><option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <select value={carrierB} onChange={e=>setCarrierB(e.target.value)} className="p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                                                {['ドコモ','au','ソフトバンク','Y!mobile','UQmobile','ahamo'].map(c=><option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </section>

                                    {/* デバイス入力セクション */}
                                    {devices.map((d, i) => (
                                        <section key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="font-bold flex items-center gap-2 text-lg"><Smartphone className="text-blue-600"/> {i+1}台目の入力</h3>
                                                {i > 0 && <button onClick={()=>copyFirstDeviceInfo(i)} className="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full border border-blue-100"><Copy className="inline w-3 h-3 mr-1"/> 1台目と同じ</button>}
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="space-y-4">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">月々の機種代</p>
                                                    <input type="number" placeholder="今の月額" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/20" onChange={e=>{const n=[...devices]; n[i].deviceFeeA=e.target.value; setDevices(n)}} />
                                                    <input type="number" placeholder="新しい月額" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/20" onChange={e=>{const n=[...devices]; n[i].deviceFeeB=e.target.value; setDevices(n)}} />
                                                </div>
                                                <div className="space-y-4">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">月々のプラン料</p>
                                                    <input type="number" placeholder="今のプラン" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/20" onChange={e=>{const n=[...devices]; n[i].planFeeA=e.target.value; setDevices(n)}} />
                                                    <input type="number" placeholder="新しいプラン" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-500/20" onChange={e=>{const n=[...devices]; n[i].planFeeB=e.target.value; setDevices(n)}} />
                                                </div>
                                            </div>
                                        </section>
                                    ))}
                                    
                                    <button onClick={handleAddDevice} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold flex items-center justify-center gap-2 hover:bg-white hover:border-blue-300 transition-colors">
                                        <PlusCircle className="w-5 h-5"/> 台数を追加する
                                    </button>

                                    {/* オプション設定セクション（こだわりポイント） */}
                                    <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <p className="text-xs font-bold text-slate-500 flex items-center gap-1"><Mail className="w-3 h-3 text-slate-400"/> メール設定</p>
                                            <select value={selectedEmail} onChange={e=>setSelectedEmail(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none">
                                                <option value="free">無料メールのみ</option>
                                                <option value="carrier">キャリアメール継続</option>
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <p className="text-xs font-bold text-slate-500 flex items-center gap-1"><Users className="w-3 h-3 text-slate-400"/> 家族回線数</p>
                                            <select value={linesCount} onChange={e=>setLinesCount(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none">
                                                {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}人（回線）</option>)}
                                            </select>
                                        </div>
                                    </section>

                                    <button onClick={() => { window.scrollTo({top:0, behavior:'smooth'}); setShowResults(true); }} className="w-full py-7 bg-blue-600 text-white font-black text-2xl rounded-full shadow-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                                        比較結果をチェック <ArrowRight />
                                    </button>
                                </motion.div>
                            ) : (
                                <motion.div key="result-view" initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="space-y-6">
                                    <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-10 rounded-[40px] text-white shadow-2xl text-center">
                                        <p className="text-blue-100 font-bold mb-2 uppercase tracking-widest text-sm">2年間の合計節約期待額</p>
                                        <h2 className="text-6xl font-black italic mb-6">¥{results.grandTotal.toLocaleString()}</h2>
                                        <div className="inline-block bg-white/20 backdrop-blur-md px-8 py-3 rounded-full font-bold text-md border border-white/30">
                                            月々 約 {Math.round(results.grandTotal / 23).toLocaleString()}円 おトク！
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-8 rounded-3xl border border-slate-100 text-center shadow-sm">
                                            <p className="text-slate-400 text-[10px] font-black mb-1 uppercase tracking-tighter">端末代の削減額</p>
                                            <p className="text-2xl font-black text-slate-800">{results.totalDeviceSavings.toLocaleString()}円</p>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl border border-slate-100 text-center shadow-sm">
                                            <p className="text-slate-400 text-[10px] font-black mb-1 uppercase tracking-tighter">プランの削減額</p>
                                            <p className="text-2xl font-black text-slate-800">{results.totalPlanSavings.toLocaleString()}円</p>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => setShowResults(false)} className="w-full py-5 bg-white border-2 border-slate-200 text-slate-500 font-black rounded-3xl flex items-center justify-center gap-2 hover:bg-slate-50 transition-colors">
                                        <ChevronLeft /> 入力画面に戻って修正
                                    </button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        // DOMの準備が整ってから確実に描画を開始する
        const render = () => {
            const rootElement = document.getElementById('root');
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        };

        if (document.readyState === 'complete') {
            render();
        } else {
            window.addEventListener('load', render);
        }
    </script>
</body>
</html>
